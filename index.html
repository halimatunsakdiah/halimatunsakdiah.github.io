<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANANTYA PUSTAKA</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    color:#fff;

    background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url("https://drive.google.com/uc?export=view&id=1cRoaxyI4VUHxpMWIZ1PfeaW04kAYyIqd");

    background-size:cover;
}

/* NAV */
nav{
    background:rgba(0,0,0,0.7);
    padding:15px;
    display:none;
}

/* CARD */
.box{
    background:rgba(255,255,255,0.1);
    padding:20px;
    margin:20px;
    border-radius:10px;
}

/* INPUT */
input{
    padding:10px;
    margin:5px;
}

/* GRID */
.grid{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.card{
    background:white;
    color:black;
    padding:10px;
    width:200px;
    border-radius:10px;
}
</style>
</head>

<body>

<nav id="navbar">
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('koleksi')">Koleksi</button>
    <button onclick="logout()">Logout</button>
</nav>

<div id="login" class="box">
    <h2>Login</h2>
    <input id="email"><br>
    <input id="password" type="password"><br>
    <button onclick="login()">Login</button>
    <p onclick="showRegister()">Register</p>
</div>

<div id="register" class="box" style="display:none;">
    <h2>Register</h2>
    <input id="regEmail"><br>
    <input id="regPassword" type="password"><br>
    <button onclick="register()">Daftar</button>
</div>

<!-- DASHBOARD ADMIN -->
<div id="dashboard" class="box" style="display:none;">
    <h2>Tambah Buku</h2>
    <input id="judul" placeholder="Judul"><br>
    <input id="penulis" placeholder="Penulis"><br>
    <input id="cover" placeholder="Link Cover"><br>
    <button onclick="tambahBuku()">Tambah</button>
</div>

<!-- KOLEKSI -->
<div id="koleksi" class="box" style="display:none;">
    <h2>Koleksi Buku</h2>
    <div id="listBuku" class="grid"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "ISI_CONFIG_KAMU",
  authDomain: "ISI_CONFIG_KAMU",
  projectId: "ISI_CONFIG_KAMU"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

/* REGISTER */
window.register = function(){
    createUserWithEmailAndPassword(auth, regEmail.value, regPassword.value)
    .then(()=>alert("Berhasil daftar"))
}

/* LOGIN */
window.login = function(){
    signInWithEmailAndPassword(auth, email.value, password.value)
    .then(()=>{
        navbar.style.display="block";
        login.style.display="none";
        showPage("koleksi");
        loadBuku();
    })
}

/* LOGOUT */
window.logout = function(){
    signOut(auth);
    location.reload();
}

/* PAGE */
window.showPage = function(id){
    document.querySelectorAll(".box").forEach(b=>b.style.display="none");
    document.getElementById(id).style.display="block";
}

/* TAMBAH BUKU */
window.tambahBuku = async function(){
    await addDoc(collection(db,"buku"),{
        judul:judul.value,
        penulis:penulis.value,
        cover:cover.value
    });
    alert("Buku ditambahkan");
    loadBuku();
}

/* LOAD BUKU */
async function loadBuku(){
    const querySnapshot = await getDocs(collection(db,"buku"));
    listBuku.innerHTML="";
    querySnapshot.forEach(doc=>{
        let b=doc.data();
        listBuku.innerHTML+=`
        <div class="card">
            <img src="${b.cover}" width="100%">
            <h4>${b.judul}</h4>
            <p>${b.penulis}</p>
            <button onclick="pinjam()">Pinjam</button>
        </div>`;
    });
}

/* PINJAM */
window.pinjam = function(){
    alert("Buku berhasil dipinjam 📚");
}

/* SWITCH */
window.showRegister = function(){
    login.style.display="none";
    register.style.display="block";
}

</script>

</body>
</html>
