<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANANTYA PUSTAKA</title>

<style>

/* BACKGROUND SUPER MODERN */
body{
font-family: 'Segoe UI', sans-serif;
margin:0;
color:#fff;

background:
linear-gradient(135deg,#1a1a2e,#16213e,#0f3460,#533483);

background-size:400% 400%;
animation:gradientBG 10s ease infinite;
}

/* ANIMASI BACKGROUND */
@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HERO */
.hero{
background:linear-gradient(90deg,#D4A017,#8E44AD);
padding:80px;
text-align:center;
font-size:20px;
letter-spacing:1px;
}

/* NAVBAR */
nav{
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
padding:15px;
display:none;
gap:20px;
}

nav a{
color:white;
cursor:pointer;
font-weight:bold;
}

/* PAGE */
.page{
display:none;
padding:40px;
min-height:60vh;
opacity:0;
transform:translateY(20px);
transition:all 0.5s ease;
}

.page.active{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
opacity:1;
transform:translateY(0);
}

/* GLASS EFFECT */
.box, .home-card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
padding:30px;
border-radius:20px;
color:white;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.box{width:400px;text-align:center;}
.home-card{width:750px;}

/* INPUT */
input,textarea{
width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:none;
}

/* BUTTON */
button{
padding:10px 20px;
background:linear-gradient(45deg,#D4A017,#8E44AD);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* EVENT */
.event-container{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.event{
background:rgba(255,255,255,0.15);
border-radius:15px;
overflow:hidden;
width:250px;
transition:0.3s;
}

.event:hover{
transform:translateY(-10px);
}

.event img{
width:100%;
height:150px;
object-fit:cover;
}

/* KOLEKSI */
.koleksi-container{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.buku{
background:rgba(255,255,255,0.15);
width:200px;
border-radius:15px;
overflow:hidden;
}

.buku img{
width:100%;
height:250px;
object-fit:cover;
}

/* FORUM */
.topik{
background:rgba(255,255,255,0.15);
padding:10px;
margin:10px;
border-radius:10px;
}

footer{
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<div class="hero">
<h1>ANANTYA PUSTAKA</h1>
<p>Ilmu Tanpa Batas • Modern Digital Library</p>
</div>

<nav id="navbar">
<a onclick="openPage('home')">Beranda</a>
<a onclick="openPage('koleksi')">Koleksi</a>
<a onclick="openPage('forum')">Forum</a>
<a onclick="logout()">Logout</a>
</nav>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="box">
<h2>Login</h2>
<input id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">
<button onclick="login()">Login</button>
<p><a onclick="showPage('register')" style="color:#FFD700;">Daftar</a></p>
</div>
</div>

<!-- REGISTER -->
<div id="register" class="page">
<div class="box">
<h2>Register</h2>

<input id="firstName" placeholder="First Name">
<input id="lastName" placeholder="Last Name">
<input id="phone" placeholder="No. HP">
<input id="regEmail" placeholder="Email">
<input type="password" id="regPassword" placeholder="Password">

<button onclick="register()">Daftar</button>
<p><a onclick="showPage('login')" style="color:#FFD700;">Login</a></p>
</div>
</div>

<!-- HOME -->
<div id="home" class="page">
<div class="home-card">

<h2>📢 Event Perpustakaan</h2>

<div class="event-container">

<div class="event">
<img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f">
<h4 style="padding:10px;">Seminar Literasi</h4>
<button onclick="daftarEvent('Seminar Literasi')">Daftar</button>
</div>

<div class="event">
<img src="https://images.unsplash.com/photo-1455390582262-044cdead277a">
<h4 style="padding:10px;">Workshop Menulis</h4>
<button onclick="daftarEvent('Workshop Menulis')">Daftar</button>
</div>

</div>

</div>
</div>

<!-- KOLEKSI -->
<div id="koleksi" class="page">
<h2>Koleksi Buku</h2>
<div class="koleksi-container">
<div class="buku">
<img src="https://covers.openlibrary.org/b/id/8228691-L.jpg">
<h4 style="padding:10px;">Laskar Pelangi</h4>
</div>
</div>
</div>

<!-- FORUM -->
<div id="forum" class="page">
<div class="box">
<input id="judulTopik" placeholder="Judul">
<textarea id="isiTopik"></textarea>
<button onclick="buatTopik()">Posting</button>
</div>
<div id="daftarTopik"></div>
</div>

<footer>© 2026 ANANTYA PUSTAKA</footer>

<script>
function showPage(id){
document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
setTimeout(()=>{p.style.display="none";},300);
});
let page=document.getElementById(id);
page.style.display="flex";
setTimeout(()=>{page.classList.add("active");},50);
}

function register(){
let user={
firstName:firstName.value,
email:regEmail.value,
password:regPassword.value
};
localStorage.setItem("user",JSON.stringify(user));
alert("Berhasil daftar");
showPage("login");
}

function login(){
let u=JSON.parse(localStorage.getItem("user"));
if(u && loginEmail.value===u.email && loginPassword.value===u.password){
navbar.style.display="flex";
alert("Welcome "+u.firstName);
showPage("home");
}else alert("Login gagal");
}

function openPage(id){showPage(id);}
function logout(){navbar.style.display="none";showPage("login");}
function daftarEvent(n){alert("Daftar ke "+n);}

function buatTopik(){
let f=JSON.parse(localStorage.getItem("forum"))||[];
f.push({judul:judulTopik.value,isi:isiTopik.value});
localStorage.setItem("forum",JSON.stringify(f));
daftarTopik.innerHTML=f.map(t=>`<div class="topik"><b>${t.judul}</b><p>${t.isi}</p></div>`).join("");
}
</script>

</body>
</html>
