<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Saya</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

nav {
    background: #800000;
    padding: 15px;
    text-align: center;
}

nav button {
    background: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    font-weight: bold;
}

nav button:hover {
    background: #ddd;
}

.container {
    padding: 30px;
    text-align: center;
}

.page {
    display: none;
}

input {
    padding: 8px;
    margin: 5px;
    width: 250px;
}

button.form-btn {
    background: #800000;
    color: white;
    border: none;
    padding: 8px 15px;
    cursor: pointer;
}
</style>
</head>
<body>

<nav id="navbar">
    <button onclick="showPage('home')">Beranda</button>
    <button onclick="showPage('about')">About Owner</button>
    <button onclick="showPage('login')">Login</button>
    <button onclick="showPage('register')">Daftar</button>
    <button onclick="logout()">Logout</button>
</nav>

<div class="container">

    <!-- HOME -->
    <div id="home" class="page">
        <h2>Beranda</h2>
        <p>Selamat datang di website saya</p>

        <h3>CV</h3>
        <p><a href="#">Lihat CV Saya</a></p>

        <h3>Instagram</h3>
        <p><a href="https://instagram.com" target="_blank">Kunjungi Instagram</a></p>

        <h3>YouTube</h3>
        <p><a href="https://youtube.com" target="_blank">Kunjungi YouTube</a></p>
    </div>

    <!-- ABOUT -->
    <div id="about" class="page">
        <h2>About Owner</h2>
        <p>Nama: Halima Harahap</p>
        <p>Mahasiswa yang sedang belajar membuat website.</p>
    </div>

    <!-- LOGIN -->
    <div id="login" class="page">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email"><br>
        <input type="password" id="loginPassword" placeholder="Password"><br>
        <button class="form-btn" onclick="login()">Login</button>
        <p>Belum punya akun? <a href="#" onclick="showPage('register')">Daftar di sini</a></p>
    </div>

    <!-- REGISTER -->
    <div id="register" class="page">
        <h2>Daftar</h2>
        <input type="text" id="regName" placeholder="Nama Lengkap"><br>
        <input type="email" id="regEmail" placeholder="Email"><br>
        <input type="password" id="regPassword" placeholder="Password"><br>
        <button class="form-btn" onclick="register()">Daftar</button>
        <p>Sudah punya akun? <a href="#" onclick="showPage('login')">Login</a></p>
    </div>

</div>

<script>
function showPage(pageId) {
    var pages = document.getElementsByClassName("page");
    for (var i = 0; i < pages.length; i++) {
        pages[i].style.display = "none";
    }
    document.getElementById(pageId).style.display = "block";
}

function register() {
    var email = document.getElementById("regEmail").value;
    var password = document.getElementById("regPassword").value;

    if (email === "" || password === "") {
        alert("Isi semua data!");
        return;
    }

    localStorage.setItem("email", email);
    localStorage.setItem("password", password);

    alert("Pendaftaran berhasil! Silakan login.");
    showPage("login");
}

function login() {
    var email = document.getElementById("loginEmail").value;
    var password = document.getElementById("loginPassword").value;

    var savedEmail = localStorage.getItem("email");
    var savedPassword = localStorage.getItem("password");

    if (email === savedEmail && password === savedPassword) {
        alert("Login berhasil!");
        showPage("home");
    } else {
        alert("Email atau Password salah!");
    }
}

function logout() {
    alert("Anda logout.");
    showPage("login");
}

window.onload = function() {
    showPage("login");
};
</script>

</body>
</html>
