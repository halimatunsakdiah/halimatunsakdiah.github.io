<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Perpustakaan Halima</title>

<!-- EKSTERNAL CSS -->
<link rel="stylesheet" href="style.css">

<!-- INTERNAL CSS -->
<style>
.page{
    display:none;
}

.box{
    background:white;
    width:350px;
    margin:auto;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input, textarea{
    width:90%;
    padding:8px;
    margin:5px;
}
</style>

</head>

<!-- INLINE CSS -->
<body style="font-family:Arial, sans-serif; margin:0; background:#f2f2f2; text-align:center;">

<!-- NAVBAR -->
<nav id="navbar" style="background:#800000; padding:15px; display:none;">
    <a onclick="showPage('home')" 
       style="color:white; margin:10px; text-decoration:none; font-weight:bold; cursor:pointer;">Beranda</a>

    <a onclick="showPage('about')" 
       style="color:white; margin:10px; text-decoration:none; font-weight:bold; cursor:pointer;">About Owner</a>

    <a onclick="showPage('contact')" 
       style="color:white; margin:10px; text-decoration:none; font-weight:bold; cursor:pointer;">Contact Us</a>

    <a onclick="logout()" 
       style="color:white; margin:10px; text-decoration:none; font-weight:bold; cursor:pointer;">Logout</a>
</nav>

<div style="margin-top:50px;">

<!-- LOGIN -->
<div id="login" class="page box">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email"><br>
    <input type="password" id="loginPassword" placeholder="Password"><br>
    <button onclick="login()" 
            style="padding:8px 15px; background:#800000; color:white; border:none; cursor:pointer;">
        Login
    </button>
    <p>Belum punya akun?
    <a href="#" onclick="showPage('register')">Daftar di sini</a></p>
</div>

<!-- REGISTER -->
<div id="register" class="page box">
    <h2>Daftar Akun</h2>
    <input type="text" id="regFirst" placeholder="First Name"><br>
    <input type="text" id="regLast" placeholder="Last Name"><br>
    <input type="email" id="regEmail" placeholder="Email"><br>
    <input type="text" id="regPhone" placeholder="Nomor HP"><br>
    <input type="password" id="regPassword" placeholder="Password"><br>
    <button onclick="register()" 
            style="padding:8px 15px; background:#800000; color:white; border:none; cursor:pointer;">
        Daftar
    </button>
</div>

<!-- HOME -->
<div id="home" class="page">
    <h1>Selamat Datang Di Halaman Web Perpustakaan Saya</h1>
    <h2>Perpustakaan Sebagai Pusat Informasi</h2>
    <p>Nama : Halimatun Sakdiah Hrp</p>
    <p>NIM  : 230709015</p>
</div>

</div>

<script>
function showPage(id){
    var pages = document.querySelectorAll(".page");
    pages.forEach(function(page){
        page.style.display="none";
    });
    document.getElementById(id).style.display="block";
}

function register(){
    var first = document.getElementById("regFirst").value.trim();
    var last = document.getElementById("regLast").value.trim();
    var email = document.getElementById("regEmail").value.trim();
    var phone = document.getElementById("regPhone").value.trim();
    var password = document.getElementById("regPassword").value.trim();

    if(first==="" || last==="" || email==="" || phone==="" || password===""){
        alert("Semua data harus diisi!");
        return;
    }

    var userData = {first, last, email, phone, password};
    localStorage.setItem("user", JSON.stringify(userData));
    alert("Pendaftaran berhasil! Silakan login.");
    showPage("login");
}

function login(){
    var email = document.getElementById("loginEmail").value.trim();
    var password = document.getElementById("loginPassword").value.trim();
    var saved = localStorage.getItem("user");

    if(!saved){
        alert("Silakan daftar terlebih dahulu!");
        return;
    }

    var user = JSON.parse(saved);

    if(email === user.email && password === user.password){
        document.getElementById("navbar").style.display="block";
        showPage("home");
    }else{
        alert("Email atau Password salah!");
    }
}

function logout(){
    document.getElementById("navbar").style.display="none";
    showPage("login");
}

window.onload = function(){
    showPage("login");
};
</script>

</body>
</html>
