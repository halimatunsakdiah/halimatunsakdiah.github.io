<script>
function showPage(id){
    document.querySelectorAll(".page").forEach(p => p.style.display="none");
    document.getElementById(id).style.display="block";
}

/* CEK LOGIN SEBELUM BUKA HALAMAN */
function openPage(id){
    if(localStorage.getItem("isLogin") !== "true"){
        alert("Anda harus login terlebih dahulu!");
        showPage("login");
        return;
    }
    showPage(id);
}

/* REGISTER */
function register(){
    var first = regFirst.value.trim();
    var last = regLast.value.trim();
    var email = regEmail.value.trim().toLowerCase();
    var phone = regPhone.value.trim();
    var password = regPassword.value.trim();

    if(!first || !last || !email || !phone || !password){
        alert("Semua data harus diisi!");
        return;
    }

    if(localStorage.getItem("user")){
        alert("Akun sudah terdaftar! Silakan login.");
        showPage("login");
        return;
    }

    localStorage.setItem("user", JSON.stringify({first,last,email,phone,password}));
    alert("Pendaftaran berhasil! Silakan login.");
    showPage("login");
}

/* LOGIN */
function login(){
    var email = loginEmail.value.trim().toLowerCase();
    var password = loginPassword.value.trim();
    var saved = localStorage.getItem("user");

    if(!saved){
        alert("Anda belum terdaftar! Silakan daftar dulu.");
        showPage("register");
        return;
    }

    var user = JSON.parse(saved);

    if(email === user.email && password === user.password){
        localStorage.setItem("isLogin","true");
        document.getElementById("navbar").style.display="flex";
        showPage("home");
    }else{
        alert("Email atau Password salah!");
    }
}

/* LOGOUT */
function logout(){
    localStorage.removeItem("isLogin");
    document.getElementById("navbar").style.display="none";
    showPage("login");
}

/* PROTEKSI SAAT HALAMAN DIBUKA */
window.onload = function(){
    if(localStorage.getItem("isLogin") === "true"){
        document.getElementById("navbar").style.display="flex";
        showPage("home");
    }else{
        document.getElementById("navbar").style.display="none";
        showPage("login");
    }
}
</script>
