<!DOCTYPE html>
<html>
<head>
    <title>Login & Register Perpustakaan</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .page {
            display: none;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background-color: #e6e6e6;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 4px;
            border: 1px solid #aaa;
        }

        button {
            padding: 8px 15px;
            background-color: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #34495e;
        }

        nav {
            background-color: #2c3e50;
            padding: 15px;
            display: none;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>

    <script>
        var savedEmail = "";
        var savedPassword = "";

        function showPage(id) {
            var pages = document.getElementsByClassName("page");
            for (var i = 0; i < pages.length; i++) {
                pages[i].style.display = "none";
            }
            document.getElementById(id).style.display = "block";
        }

        function register() {
            var email = document.getElementById("regEmail").value;
            var password = document.getElementById("regPassword").value;

            if (email === "" || password === "") {
                alert("Semua data harus diisi!");
                return;
            }

            savedEmail = email;
            savedPassword = password;

            alert("Pendaftaran berhasil! Silakan login.");
            showPage("loginPage");
        }

        function login() {
            var email = document.getElementById("loginEmail").value;
            var password = document.getElementById("loginPassword").value;

            if (email === savedEmail && password === savedPassword) {
                document.getElementById("navbar").style.display = "block";
                showPage("homePage");
            } else {
                alert("Email atau Password salah!");
            }
        }

        function logout() {
            document.getElementById("navbar").style.display = "none";
            showPage("loginPage");
        }

        window.onload = function() {
            showPage("loginPage");
        }
    </script>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="page container">
    <h2>Login</h2>

    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">

    <button type="button" onclick="login()">Login</button>

    <p>Belum punya akun?
        <a href="#" onclick="showPage('registerPage')">Daftar di sini</a>
    </p>
</div>

<!-- REGISTER -->
<div id="registerPage" class="page container">
    <h2>Daftar Akun</h2>

    <input type="text" placeholder="Last Name">
    <input type="text" placeholder="First Name">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="text" placeholder="No HP">
    <input type="password" id="regPassword" placeholder="Password">

    <button type="button" onclick="register()">Daftar</button>
    <br>
    <button type="button" onclick="showPage('loginPage')">
        Kembali ke Login
    </button>
</div>

<!-- NAVIGASI -->
<nav id="navbar">
    <a href="#" onclick="showPage('homePage')">Beranda</a>
    <a href="#" onclick="logout()">Logout</a>
</nav>

<!-- BERANDA -->
<div id="homePage" class="page container">
    <h2>Selamat Datang di Perpustakaan</h2>
    <p>Login berhasil 🎉</p>
</div>

</body>
</html>
