<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANANTYA PUSTAKA</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', sans-serif;
    color:#fff;

    background:
    linear-gradient(rgba(10,8,5,0.7), rgba(10,8,5,0.9)),
    url("https://drive.google.com/uc?export=view&id=1cRoaxyI4VUHxpMWIZ1PfeaW04kAYyIqd");

    background-size:cover;
    background-attachment:fixed;
}

/* HERO */
.hero{
    text-align:center;
    padding:100px 20px;
}

/* NAVBAR */
nav{
    display:none;
    background:rgba(0,0,0,0.7);
    padding:15px;
    text-align:center;
}

nav button{
    margin:5px;
}

/* PAGE */
.page{
    display:none;
    justify-content:center;
    align-items:center;
    min-height:60vh;
}

/* CARD */
.box{
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

/* INPUT */
input{
    width:90%;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:5px;
}

/* BUTTON */
button{
    padding:10px 20px;
    background:#D4A017;
    border:none;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* KOLEKSI */
.koleksi{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    background:white;
    color:black;
    padding:10px;
    width:180px;
    border-radius:10px;
}

.card img{
    width:100%;
}
</style>
</head>

<body>

<div class="hero">
    <h1>ANANTYA PUSTAKA</h1>
    <p>Perpustakaan Digital Modern</p>
</div>

<!-- NAVBAR -->
<nav id="navbar">
    <button onclick="openPage('home')">Home</button>
    <button onclick="openPage('koleksi')">Koleksi</button>
    <button onclick="logout()">Logout</button>
</nav>

<!-- LOGIN -->
<div id="login" class="page">
    <div class="box">
        <h2>Login</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p onclick="showRegister()" style="cursor:pointer;">Belum punya akun?</p>
    </div>
</div>

<!-- REGISTER -->
<div id="register" class="page">
    <div class="box">
        <h2>Register</h2>
        <input type="email" id="regEmail" placeholder="Email">
        <input type="password" id="regPassword" placeholder="Password">
        <button onclick="register()">Daftar</button>
        <p onclick="showLogin()" style="cursor:pointer;">Sudah punya akun?</p>
    </div>
</div>

<!-- HOME -->
<div id="home" class="page">
    <div class="box">
        <h2>Selamat Datang 📚</h2>
        <p>Website perpustakaan modern</p>
    </div>
</div>

<!-- KOLEKSI -->
<div id="koleksi" class="page">
    <div class="koleksi">
        <div class="card">
            <img src="https://covers.openlibrary.org/b/id/8231856-L.jpg">
            <h4>Atomic Habits</h4>
        </div>
        <div class="card">
            <img src="https://covers.openlibrary.org/b/id/8228691-L.jpg">
            <h4>Laskar Pelangi</h4>
        </div>
    </div>
</div>

<script>

/* LOAD AWAL */
window.onload = function(){
    showPage("login");
}

/* PINDAH PAGE */
function showPage(id){
    document.querySelectorAll(".page").forEach(p=>p.style.display="none");
    document.getElementById(id).style.display="flex";
}

/* REGISTER */
function register(){
    let user = {
        email: document.getElementById("regEmail").value,
        password: document.getElementById("regPassword").value
    };

    localStorage.setItem("user", JSON.stringify(user));
    alert("Berhasil daftar!");
    showPage("login");
}

/* LOGIN */
function login(){
    let user = JSON.parse(localStorage.getItem("user"));

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(user && email === user.email && password === user.password){
        alert("Login berhasil 🎉");
        document.getElementById("navbar").style.display="block";
        showPage("home");
    } else {
        alert("Email atau password salah ❌");
    }
}

/* LOGOUT */
function logout(){
    document.getElementById("navbar").style.display="none";
    showPage("login");
}

/* NAV */
function openPage(id){
    showPage(id);
}

/* SWITCH */
function showRegister(){
    showPage("register");
}

function showLogin(){
    showPage("login");
}

</script>

</body>
</html>
