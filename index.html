<!DOCTYPE html>
<html>
<head>
<title>Login & Register</title>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
}

.page {
    display: none;
}

.form-container {
    width: 400px;
    margin: 100px auto;
    background: #e6e6e6;
    padding: 30px;
    border-radius: 10px;
}
</style>

<script>
function showPage(id) {
    var pages = document.getElementsByClassName("page");
    for (var i = 0; i < pages.length; i++) {
        pages[i].style.display = "none";
    }
    document.getElementById(id).style.display = "block";
}

window.onload = function() {
    showPage("loginPage");
}
</script>

</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="page form-container">
    <h2>Login</h2>
    <input type="email" placeholder="Email"><br><br>
    <input type="password" placeholder="Password"><br><br>
    <button>Login</button>

    <p>Belum punya akun?
        <a href="#" onclick="showPage('registerPage')">Daftar di sini</a>
    </p>
</div>

<!-- REGISTER -->
<div id="registerPage" class="page form-container">
    <h2>Daftar Akun</h2>
    <input type="text" placeholder="Last Name"><br><br>
    <input type="text" placeholder="First Name"><br><br>
    <input type="email" placeholder="Email"><br><br>
    <input type="text" placeholder="No HP"><br><br>
    <input type="password" placeholder="Password"><br><br>
    <button>Daftar</button><br><br>

    <button onclick="showPage('loginPage')">Kembali ke Login</button>
</div>

</body>
</html>
