<script>
function showPage(id){
    var pages = document.querySelectorAll(".page");
    pages.forEach(function(page){
        page.style.display="none";
    });
    document.getElementById(id).style.display="block";
}

function register(){
    var first = document.getElementById("regFirst").value.trim();
    var last = document.getElementById("regLast").value.trim();
    var email = document.getElementById("regEmail").value.trim().toLowerCase();
    var phone = document.getElementById("regPhone").value.trim();
    var password = document.getElementById("regPassword").value.trim();

    if(first==="" || last==="" || email==="" || phone==="" || password===""){
        alert("Semua data harus diisi!");
        return;
    }

    // simpan sebagai satu object
    var userData = {
        firstName: first,
        lastName: last,
        email: email,
        phone: phone,
        password: password
    };

    localStorage.setItem("user", JSON.stringify(userData));

    alert("Pendaftaran berhasil! Silakan login.");
    showPage("login");
}

function login(){
    var email = document.getElementById("loginEmail").value.trim().toLowerCase();
    var password = document.getElementById("loginPassword").value.trim();

    var savedData = localStorage.getItem("user");

    if(!savedData){
        alert("Akun belum terdaftar!");
        return;
    }

    var user = JSON.parse(savedData);

    if(email === user.email && password === user.password){
        document.getElementById("navbar").style.display="block";
        showPage("home");
    } else{
        alert("Email atau Password salah!");
    }
}

function logout(){
    document.getElementById("navbar").style.display="none";
    showPage("login");
}

function kirimWA(){
    var nama = document.getElementById("nama").value;
    var email = document.getElementById("email").value;
    var pesan = document.getElementById("pesan").value;

    if(nama==="" || email==="" || pesan===""){
        alert("Semua data harus diisi!");
        return;
    }

    var text = "Halo, saya " + nama +
               "%0AEmail: " + email +
               "%0APesan: " + pesan;

    var nomor = "6282166448371";

    window.open("https://wa.me/" + nomor + "?text=" + text, "_blank");
}

window.onload=function(){
    showPage("login");
}
</script>
</body>
</html>
